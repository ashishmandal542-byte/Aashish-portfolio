<nav class="bg-black text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Ashish Portfolio</h1>

  <!-- Desktop Buttons -->
  <div class="hidden md:flex space-x-4">
    <button onclick="showSection('about')" class="menu-btn">About</button>
    <button onclick="showSection('cocktails')" class="menu-btn">Cocktails</button>
    <button onclick="showSection('experience')" class="menu-btn">Experience</button>
    <button onclick="showSection('contact')" class="menu-btn">Contact</button>
  </div>

  <!-- Mobile Toggle -->
  <button id="menu-btn" class="md:hidden text-2xl">☰</button>
</nav>

<!-- Mobile Buttons -->
<div id="mobile-menu" class="hidden bg-black text-white p-4 flex flex-col space-y-2">
  <button onclick="showSection('about')" class="menu-btn">About</button>
  <button onclick="showSection('cocktails')" class="menu-btn">Cocktails</button>
  <button onclick="showSection('experience')" class="menu-btn">Experience</button>
  <button onclick="showSection('contact')" class="menu-btn">Contact</button>
</div>

<style>
.menu-btn {
  padding: 8px 16px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid white;
  transition: all 0.3s ease;
}

.menu-btn:hover {
  background: white;
  color: black;
  transform: scale(1.05);
}
</style>

<section id="about" class="section hidden p-6">
  <h2 class="text-2xl font-bold">About</h2>
  <p>Hospitality professional & mixologist.</p>
</section>

<section id="cocktails" class="section hidden p-6 bg-gray-100">
  <h2 class="text-2xl font-bold">Cocktails</h2>
  <div id="cocktail-list"></div>
</section>

<section id="experience" class="section hidden p-6">
  <h2 class="text-2xl font-bold">Experience</h2>
</section>

<section id="contact" class="section hidden p-6 bg-gray-100">
  <h2 class="text-2xl font-bold">Contact</h2>
</section>

<script>
  const sections = ["about", "cocktails", "experience", "contact"];

  function showSection(id) {
    sections.forEach(sec => {
      const el = document.getElementById(sec);

      // fade out
      el.classList.remove("active");
      el.classList.add("hidden");
    });

    const activeSection = document.getElementById(id);

    // delay for smoother transition
    setTimeout(() => {
      activeSection.classList.remove("hidden");
      activeSection.classList.add("active");
    }, 100);

    // close mobile menu
    document.getElementById("mobile-menu").classList.add("hidden");
  }

  // mobile toggle
  document.getElementById("menu-btn").addEventListener("click", () => {
    document.getElementById("mobile-menu").classList.toggle("hidden");
  });

  // default load
  showSection("about");
</script>
<style>
.section {
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.4s ease;
}

.section.active {
  opacity: 1;
  transform: translateY(0);
}
</style>
